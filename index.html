<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>নিরাপদ টিআইএন অনুসন্ধান</title>

  <!-- ✅ Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-sm">
        <div class="card-body">

          <h1 class="page-title text-center mb-4">
            ২০২৩-২০২৪ সালের অডিট নির্বাচন – টিআইএন অনুসন্ধান
          </h1>

          <!-- Input -->
          <input
            id="tinInput"
            type="text"
            maxlength="12"
            class="form-control form-control-lg text-center"
            placeholder="১২ সংখ্যার সম্পূর্ণ টিআইএন লিখুন">

          <p class="text-muted text-center mt-2">
            ১২ সংখ্যা পূর্ণ হলে তবেই অনুসন্ধান হবে
          </p>

          <!-- ✅ Desktop Table -->
          <div class="table-responsive mt-4 d-none d-md-block">
            <table class="table table-bordered align-middle">
              <thead class="table-secondary">
                <tr>
                  <th>টিআইএন</th>
                  <th>কর অঞ্চল</th>
                  <th>সার্কেল</th>
                  <th>দাখিলের ধরন</th>
                  <th>আয়বর্ষ</th>
                </tr>
              </thead>
              <tbody id="results"></tbody>
            </table>
          </div>

          <!-- ✅ Mobile Card -->
          <div id="mobileResult" class="d-md-none mt-4"></div>

        </div>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
